services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    image: ${DOCKERHUB_USERNAME}/audio-app:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - UPLOAD_DIR=/app/uploads
      - OUTPUT_DIR=/app/outputs
      - MODELS_CACHE_DIR=/app/models_cache
    ports:
      - "8084:8000"
    volumes:
      - uploads:/app/uploads
      - outputs:/app/outputs
      - models_cache:/app/models_cache
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 2g

  worker:
    image: ${DOCKERHUB_USERNAME}/audio-app:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - UPLOAD_DIR=/app/uploads
      - OUTPUT_DIR=/app/outputs
      - MODELS_CACHE_DIR=/app/models_cache
    volumes:
      - uploads:/app/uploads
      - outputs:/app/outputs
      - models_cache:/app/models_cache
    depends_on:
      redis:
        condition: service_healthy
    # Single worker — pipeline is RAM-intensive (~12GB peak with MusicGen)
    command: celery -A app.worker worker --loglevel=info --concurrency=1
    mem_limit: 14g

  watchtower:
    image: containrrr/watchtower:1.7.1
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 60 --cleanup

volumes:
  redis_data:
  uploads:
  outputs:
  models_cache:
